<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Palestra App</title>
    <meta name="robots" content="noindex, nofollow">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap');

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            background:
                radial-gradient(circle at top right, rgba(79, 70, 229, 0.32), transparent 34rem),
                radial-gradient(circle at bottom left, rgba(30, 41, 59, 0.42), transparent 28rem),
                #020617;
        }

        .palestra-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(16px);
            box-shadow: 0 30px 90px rgba(0, 0, 0, 0.32);
        }

        .loader {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(79, 70, 229, 0.24);
            border-top-color: #4f46e5;
            border-radius: 9999px;
            animation: spin 0.85s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="text-slate-900">

    <main class="min-h-screen flex items-center justify-center px-6 py-12">
        <section class="w-full max-w-xl palestra-card rounded-[2rem] p-8 md:p-10">
            <div class="text-center mb-8">
                <img src="assets/logo-palestra.png" alt="Logo Palestra" class="w-20 h-20 object-contain mx-auto mb-5 rounded-2xl bg-white shadow-sm p-2">
                <span class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-indigo-100 text-indigo-700 text-xs font-black uppercase tracking-widest mb-5">
                    <i data-lucide="lock-keyhole" class="w-4 h-4"></i>
                    Recuperación de cuenta
                </span>
                <h1 class="text-3xl md:text-4xl font-black text-slate-900 leading-tight">Crear nueva contraseña</h1>
                <p id="pageHelp" class="text-slate-500 mt-4 leading-relaxed">
                    Ingresá una nueva contraseña para volver a acceder a Palestra App.
                </p>
            </div>

            <div id="loadingState" class="flex flex-col items-center justify-center py-8">
                <div class="loader mb-4"></div>
                <p class="text-sm font-bold text-slate-500">Validando enlace de recuperación...</p>
            </div>

            <form id="resetForm" class="hidden space-y-5">
                <div>
                    <label for="password" class="block text-sm font-black text-slate-700 mb-2">Nueva contraseña</label>
                    <div class="relative">
                        <input id="password" name="password" type="password" minlength="6" required
                            class="w-full rounded-2xl border border-slate-200 bg-white px-5 py-4 pr-12 text-slate-900 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition"
                            placeholder="Mínimo 6 caracteres">
                        <button type="button" data-toggle="password" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition" aria-label="Mostrar contraseña">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div>
                    <label for="confirmPassword" class="block text-sm font-black text-slate-700 mb-2">Confirmar contraseña</label>
                    <div class="relative">
                        <input id="confirmPassword" name="confirmPassword" type="password" minlength="6" required
                            class="w-full rounded-2xl border border-slate-200 bg-white px-5 py-4 pr-12 text-slate-900 outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition"
                            placeholder="Repetí la contraseña">
                        <button type="button" data-toggle="confirmPassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-indigo-600 transition" aria-label="Mostrar contraseña">
                            <i data-lucide="eye" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button id="submitButton" type="submit"
                    class="w-full inline-flex items-center justify-center gap-3 rounded-2xl bg-indigo-600 px-6 py-4 text-white font-black text-lg hover:bg-indigo-700 transition shadow-xl shadow-indigo-100">
                    <i data-lucide="check-circle" class="w-5 h-5"></i>
                    Guardar nueva contraseña
                </button>
            </form>

            <div id="messageBox" class="hidden mt-6 rounded-2xl p-5 text-sm font-semibold leading-relaxed"></div>

            <div id="successActions" class="hidden mt-6 text-center">
                <a href="index.html" class="inline-flex items-center justify-center gap-2 rounded-2xl bg-slate-900 px-6 py-3 text-white font-bold hover:bg-indigo-600 transition">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Volver a la web
                </a>
            </div>

            <div class="mt-8 pt-6 border-t border-slate-100 text-center">
                <p class="text-xs text-slate-400">
                    Esta página no aparece en el menú. Sólo se usa desde el enlace enviado por correo.
                </p>
            </div>
        </section>
    </main>

    <script>
        lucide.createIcons();

        const CONFIG = {
            supabaseUrl: "https://lqnwdoehandtzxfzeghc.supabase.co",
            supabaseAnonKey: "sb_publishable_VC-GuhM65eDiZxHSwmRF9w_tLK_xqdr"
        };

        const client = window.supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseAnonKey, {
            auth: {
                detectSessionInUrl: true,
                persistSession: true,
                autoRefreshToken: true
            }
        });

        const loadingState = document.getElementById('loadingState');
        const resetForm = document.getElementById('resetForm');
        const messageBox = document.getElementById('messageBox');
        const successActions = document.getElementById('successActions');
        const submitButton = document.getElementById('submitButton');

        function showMessage(type, text) {
            messageBox.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border-red-100', 'bg-emerald-50', 'text-emerald-700', 'border-emerald-100', 'bg-indigo-50', 'text-indigo-700', 'border-indigo-100');
            messageBox.classList.add('border');

            if (type === 'success') {
                messageBox.classList.add('bg-emerald-50', 'text-emerald-700', 'border-emerald-100');
            } else if (type === 'info') {
                messageBox.classList.add('bg-indigo-50', 'text-indigo-700', 'border-indigo-100');
            } else {
                messageBox.classList.add('bg-red-50', 'text-red-700', 'border-red-100');
            }

            messageBox.textContent = text;
        }

        function getUrlValues() {
            const searchParams = new URLSearchParams(window.location.search);
            const hashParams = new URLSearchParams(window.location.hash.replace(/^#/, ''));

            return {
                code: searchParams.get('code'),
                accessToken: hashParams.get('access_token'),
                refreshToken: hashParams.get('refresh_token'),
                error: searchParams.get('error') || hashParams.get('error'),
                errorDescription: searchParams.get('error_description') || hashParams.get('error_description')
            };
        }

        async function prepareRecoverySession() {
            const urlValues = getUrlValues();

            if (urlValues.error) {
                throw new Error(urlValues.errorDescription || 'El enlace de recuperación no es válido o ya venció.');
            }

            if (urlValues.code) {
                const { error } = await client.auth.exchangeCodeForSession(urlValues.code);
                if (error) throw error;
            }

            if (urlValues.accessToken && urlValues.refreshToken) {
                const { error } = await client.auth.setSession({
                    access_token: urlValues.accessToken,
                    refresh_token: urlValues.refreshToken
                });
                if (error) throw error;
            }

            const { data, error } = await client.auth.getSession();
            if (error) throw error;

            if (!data.session) {
                throw new Error('No se encontró una sesión de recuperación activa. Abrí esta página desde el enlace que llegó a tu correo.');
            }

            return data.session;
        }

        document.querySelectorAll('[data-toggle]').forEach(button => {
            button.addEventListener('click', () => {
                const input = document.getElementById(button.dataset.toggle);
                input.type = input.type === 'password' ? 'text' : 'password';
            });
        });

        resetForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            if (password.length < 6) {
                showMessage('error', 'La contraseña debe tener al menos 6 caracteres.');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('error', 'Las contraseñas no coinciden.');
                return;
            }

            submitButton.disabled = true;
            submitButton.classList.add('opacity-70', 'cursor-not-allowed');
            submitButton.innerHTML = '<span class="loader"></span> Guardando contraseña...';

            const { error } = await client.auth.updateUser({ password });

            if (error) {
                submitButton.disabled = false;
                submitButton.classList.remove('opacity-70', 'cursor-not-allowed');
                submitButton.innerHTML = '<i data-lucide="check-circle" class="w-5 h-5"></i> Guardar nueva contraseña';
                lucide.createIcons();
                showMessage('error', error.message || 'No se pudo actualizar la contraseña.');
                return;
            }

            await client.auth.signOut();

            resetForm.classList.add('hidden');
            successActions.classList.remove('hidden');
            showMessage('success', 'Contraseña actualizada correctamente. Ya podés volver a iniciar sesión en Palestra App.');
        });

        (async () => {
            try {
                await prepareRecoverySession();
                loadingState.classList.add('hidden');
                resetForm.classList.remove('hidden');
                showMessage('info', 'Enlace validado. Ahora podés crear una nueva contraseña.');
            } catch (error) {
                loadingState.classList.add('hidden');
                showMessage('error', error.message || 'No se pudo validar el enlace de recuperación.');
            }

            lucide.createIcons();
        })();
    </script>
</body>
</html>
